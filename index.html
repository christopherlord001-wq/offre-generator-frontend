

<!DOCTYPE html>

<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calculateur eZsign</title>

  <!-- Link to the stylesheet (same folder) -->
  <link rel="stylesheet" href="style.css?v=2.7" />
</head>
<body>
  <div class="appbar">
    <span class="appbar-ez-mark" aria-label="eZsign">ez</span>
    <div id="title" class="app-title">Calculateur eZsign</div>

    <button id="infoBtn" class="icon-btn" title="Tarifs">i</button>
    <button id="compareBtn" class="chip">Comparer</button>

    <!-- NEW, Offer of service -->
    <button id="offerBtn" class="chip">Offre de service</button>
    <button id="meetingAiBtn" class="chip meeting-ai-top">Analyse IA</button>
    <button id="settingsBtn" class="chip">Settings</button>

    <button id="themeBtn" class="chip">Thème clair</button>
    <button id="langBtn" class="lang-btn">EN</button>
  </div>

  <main class="container">
    <div class="inline-toolbar">
      <button id="inlineCompareBtn" class="chip btn-ghost">
        + Comparer (ajouter une colonne)
      </button>
    </div>

    <div id="lanes" class="lanes"></div>
  </main>

  <!-- Pricing modal -->
  <div id="pricingModal" class="modal" aria-hidden="true">
    <div class="backdrop" data-close></div>
    <div class="dialog" role="dialog" aria-modal="true">
      <div class="head">
        <h3 id="pricingTitle">Tarifs</h3>
        <button class="close-x" data-close>&times;</button>
      </div>
      <div id="pricingBody" class="body"></div>
    </div>
  </div>

  <!-- Compare modal -->
  <div id="compareModal" class="modal" aria-hidden="true">
    <div class="backdrop" data-close></div>
    <div class="dialog" role="dialog" aria-modal="true">
      <div class="head">
        <h3 id="compareTitle">Comparer les forfaits</h3>
        <button class="close-x" data-close>&times;</button>
      </div>
      <div id="compareBody" class="body"></div>
    </div>
  </div>

  <!-- NEW, Offer modal -->
  <div id="offerModal" class="modal" aria-hidden="true">
    <div class="backdrop" data-close></div>
    <div class="dialog" role="dialog" aria-modal="true">
      <div class="head">
        <h3 id="offerTitle">Offre de service</h3>
        <button class="close-x" data-close>&times;</button>
      </div>

      <div class="field">
  <label id="offerCompanyLabel" for="offerCompanyName">Nom de la compagnie</label>

  <div class="companyRow">
    <input id="offerCompanyName" type="text" placeholder="Ex, MRC de L’Érable" autocomplete="organization" />

    <div class="langToggle" role="radiogroup" aria-label="Langue de l’offre">
      <button type="button" class="langOpt isActive" data-offer-lang="fr" aria-checked="true">FR</button>
      <button type="button" class="langOpt" data-offer-lang="en" aria-checked="false">EN</button>
    </div>
  </div>
</div>


        <div class="field" style="margin-top:12px">
          <label id="offerSignerLabel" for="offerSigner">Créée par</label>
          <select id="offerSigner">
            <option value="christopher">Christopher Lord, christopher.lord@ezsign.ca</option>
            <option value="marie-eve">Marie-Ève Gauvin Rondeau, marie-eve.rondeau@ezsign.ca</option>
            <option value="meher">Meher Nalbandian, meher.nalbandian@ezsign.ca</option>
            <option value="other">Autre</option>
          </select>
        </div>

        <div id="offerSignerOtherFields" class="controls offer-other-fields" style="display:none">
          <div class="field">
            <label id="offerSignerNameLabel" for="offerSignerName">Nom</label>
            <input id="offerSignerName" type="text" autocomplete="name" />
          </div>
          <div class="field">
            <label id="offerSignerEmailLabel" for="offerSignerEmail">Courriel</label>
            <input id="offerSignerEmail" type="email" autocomplete="email" />
          </div>
        </div>

        <div id="offerSimulations" class="offer-simulations"></div>

        <div class="output-options" role="group" aria-label="Formats à générer">
          <label class="feature-option">
            <input id="outputWordCheck" type="checkbox" checked />
            <span id="outputWordLabel">Word</span>
          </label>
          <label class="feature-option">
            <input id="outputPdfCheck" type="checkbox" checked />
            <span id="outputPdfLabel">PDF</span>
          </label>
        </div>

        <div class="offer-actions">
          <button id="addSimulationBtn" type="button" class="chip btn-ghost">+ Ajouter une simulation</button>
          <button id="offerGenerateBtn" class="btn">Générer Word + PDF</button>
        </div>

        <div class="note" id="offerDatesNote"></div>

        <div class="field" style="margin-top:12px">
          <label id="offerPreviewLabel" for="offerPreview">Aperçu, section SIMULATION</label>
          <textarea id="offerPreview" rows="10" readonly></textarea>
        </div>
      </div>
    </div>
  </div>

  <div id="meetingAiModal" class="modal meeting-ai-modal" aria-hidden="true">
    <div class="backdrop" data-close></div>
    <div class="dialog meeting-ai-dialog" role="dialog" aria-modal="true">
      <div class="head">
        <h3>Analyse IA des rencontres</h3>
        <button class="close-x" data-close>&times;</button>
      </div>
      <div class="body meeting-ai-body">
        <section class="meeting-ai-panel meeting-ai-form-panel">
          <div class="meeting-ai-status" id="meetingAiStatus">Vérification Ollama...</div>

          <div class="meeting-ai-grid">
            <div class="field">
              <label for="meetingClientName">Client</label>
              <input id="meetingClientName" type="text" placeholder="Ex. Coopérative d’habitation des Cantons de l’Est" autocomplete="organization" />
            </div>
            <div class="field">
              <label for="meetingDate">Date</label>
              <input id="meetingDate" type="date" />
            </div>
            <div class="field">
              <label for="meetingReference">Référence</label>
              <input id="meetingReference" type="text" placeholder="Ex. Référé par Hopem" />
            </div>
            <div class="field">
              <label for="meetingSalesRep">Représentant</label>
              <input id="meetingSalesRep" type="text" placeholder="Nom du sales" autocomplete="name" />
            </div>
            <div class="field">
              <label for="meetingType">Type</label>
              <select id="meetingType">
                <option value="Démo / discovery">Démo / discovery</option>
                <option value="Suivi">Suivi</option>
                <option value="Renouvellement">Renouvellement</option>
                <option value="Closing">Closing</option>
              </select>
            </div>
          </div>

          <div class="field meeting-transcript-field">
            <label for="meetingTranscript">Transcript</label>
            <textarea id="meetingTranscript" rows="14" placeholder="Colle le transcript complet de la rencontre ici..."></textarea>
          </div>

          <div class="meeting-ai-actions">
            <button id="meetingAnalyzeBtn" class="btn" type="button">Analyser la rencontre</button>
            <button id="meetingClearBtn" class="chip btn-ghost" type="button">Effacer</button>
          </div>
        </section>

        <section class="meeting-ai-panel meeting-ai-results-panel">
          <div class="meeting-ai-results-head">
            <h4>Résultat</h4>
            <span id="meetingAiMeta" class="muted"></span>
          </div>
          <div id="meetingAiResult" class="meeting-ai-result empty-state">
            Colle un transcript et lance l’analyse.
          </div>
        </section>

        <aside class="meeting-ai-panel meeting-ai-history-panel">
          <div class="meeting-ai-results-head">
            <h4>Mémoire</h4>
          </div>
          <div id="meetingAiMemory" class="meeting-ai-memory muted"></div>
          <div id="meetingAiHistory" class="meeting-ai-history"></div>
        </aside>
      </div>
    </div>
  </div>

  <div id="featureModal" class="modal feature-modal" aria-hidden="true">
    <div class="backdrop" data-close></div>
    <div class="dialog feature-dialog" role="dialog" aria-modal="true">
      <div class="head">
        <h3 id="featureModalTitle">Fonctionnalités discutées</h3>
        <button class="close-x" data-close>&times;</button>
      </div>
      <div class="body">
        <p id="featureModalIntro" class="muted"></p>
        <div id="featureChecklist" class="feature-checklist"></div>

        <div class="feature-other">
          <label class="feature-option">
            <input id="featureOtherCheck" type="checkbox" />
            <span id="featureOtherLabel">Autre</span>
          </label>
          <textarea id="featureOtherText" rows="3"></textarea>
        </div>

        <div class="feature-modal-actions">
          <button id="featureDefaultsBtn" type="button" class="chip btn-ghost">Suggestions par défaut</button>
          <button id="featureSaveBtn" type="button" class="btn">Appliquer</button>
        </div>
      </div>
    </div>
  </div>

  <script src="./auth.js?v=1.1"></script>
  <script src="./app.js?v=2.5"></script>
  <script src="./meeting-ai.js?v=1.5"></script>
</body>
</html>
