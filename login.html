<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connexion eZsign</title>
  <link rel="stylesheet" href="style.css?v=3.4" />
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-card">
      <div class="login-panel">
        <img class="login-logo-img" src="/logo-ezsign.png" alt="eZsign" />
        <h1>Connexion</h1>
        <form id="loginForm" class="login-form" method="post" action="/api/auth/login">
          <label>
            Email
            <input id="loginEmail" type="email" autocomplete="username" required />
          </label>
          <label>
            Mot de passe
            <input id="loginPassword" type="password" autocomplete="current-password" required />
          </label>
          <button id="loginSubmit" class="btn" type="submit">Se connecter</button>
          <p id="loginError" class="login-error" role="alert"></p>
        </form>
      </div>
      <div class="login-visual" aria-hidden="true"></div>
    </section>
  </main>
  <script src="config.js?v=1.2"></script>
  <script>
    const CONFIG_API_BASE = String(window.EZSIGN_CONFIG?.apiBaseUrl || '').trim().replace(/\/+$/, '');
    const IS_FILE = window.location.protocol === 'file:';
    const IS_GITHUB_PAGES = window.location.hostname.endsWith('github.io');
    const AUTH_BASE = IS_FILE ? 'http://127.0.0.1:5055' : (IS_GITHUB_PAGES ? CONFIG_API_BASE : '');
    const AUTH_CREDENTIALS = AUTH_BASE ? 'include' : 'same-origin';
    const APP_URL = IS_FILE ? `${AUTH_BASE}/` : (IS_GITHUB_PAGES ? (AUTH_BASE ? `${AUTH_BASE}/` : './') : '/');
    document.querySelector('.login-logo-img').src = `${AUTH_BASE}/logo-ezsign.png`;
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('loginError');
    const button = document.getElementById('loginSubmit');
    form.addEventListener('submit', async event => {
      event.preventDefault();
      errorEl.textContent = '';
      button.disabled = true;
      button.textContent = 'Connexion...';
      try {
        const res = await fetch(`${AUTH_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: AUTH_CREDENTIALS,
          body: JSON.stringify({
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Connexion impossible.');
        window.location.href = APP_URL;
      } catch (error) {
        errorEl.textContent = error.message;
      } finally {
        button.disabled = false;
        button.textContent = 'Se connecter';
      }
    });
  </script>
</body>
</html>
